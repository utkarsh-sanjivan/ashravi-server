name: Deploy Staging

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  NODE_ENV: production

jobs:
  build:
    name: Build & Test (Staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --runInBand

      - name: Build project
        run: npm run build

      - name: Generate static export
        run: npx next export -o out

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-export
          path: out
          if-no-files-found: error

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
      S3_BUCKET: ${{ secrets.S3_BUCKET_STAGING }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_STAGING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-export
          path: out

      - name: Sync assets to S3
        run: |
          aws s3 sync ./out s3://$S3_BUCKET --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment to staging completed with status: ${{ job.status }}"
name: Deploy Production

on:
  push:
    branches:
      - production

env:
  AWS_REGION: ap-south-1
  AWS_DEFAULT_REGION: ap-south-1
  NODE_ENV: production

jobs:
  build:
    name: Build & Test (Production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test -- --runInBand

      - name: Build project
        run: pnpm run build

      - name: Generate static export
        run: pnpm exec next export -o out

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-export
          path: out
          if-no-files-found: error

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET_PROD }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-export
          path: out

      - name: Sync assets to S3
        run: |
          aws s3 sync ./.open-next/assets s3://$S3_BUCKET --delete --region "$AWS_REGION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment to production completed with status: ${{ job.status }}"